<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Мафіознік 🇺🇦</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-app-compat.js"></script>
<script src="https://cdn.jsdelivr.net/npm/firebase@9.23.0/firebase-database-compat.js"></script>
<style>
:root{
  --bg:#07070a;--s1:#0f0f14;--s2:#16161e;--s3:#1e1e28;
  --b1:#ffffff0d;--b2:#ffffff16;
  --gold:#c8a84b;--gold2:#e8c96b;
  --red:#e74c3c;--blue:#5dade2;--green:#2ecc71;--purple:#c084fc;
  --text:#ede8df;--muted:#6e6a78;--muted2:#9e9aaa;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:"Jost",sans-serif;overflow:hidden;user-select:none}
.app{position:fixed;inset:0;display:flex;flex-direction:column}
.screen{flex:1;overflow:hidden;display:flex;flex-direction:column;transition:opacity .25s,transform .25s}
.screen.gone{opacity:0;pointer-events:none;transform:translateY(8px);position:absolute;inset:0}
.scroll{flex:1;overflow-y:auto;padding:14px 15px 8px}.scroll::-webkit-scrollbar{display:none}
header{display:flex;align-items:center;gap:10px;padding:12px 15px 10px;border-bottom:1px solid var(--b1);background:linear-gradient(180deg,rgba(7,7,10,.98),transparent);flex-shrink:0;position:relative}
header::after{content:"";position:absolute;bottom:-1px;left:15%;right:15%;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);opacity:.2}
.logo{font-family:"Playfair Display",serif;font-size:17px;font-weight:900;letter-spacing:2px;text-transform:uppercase;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;flex:1}
.hpill{font-size:9px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;padding:4px 10px;border-radius:20px}
.pn{background:#14082a;color:var(--purple);border:1px solid #c084fc28}
.pd{background:#140e00;color:var(--gold);border:1px solid #c8a84b28}
.pv{background:#140508;color:var(--red);border:1px solid #e74c3c28}
.pl{background:#081408;color:var(--green);border:1px solid #2ecc7128}
.pe{background:#111;color:var(--muted2);border:1px solid var(--b2)}
.bnav{display:flex;background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.bntab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 7px;font-size:8px;letter-spacing:.8px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;text-transform:uppercase;transition:color .2s}
.bntab svg{width:18px;height:18px;stroke-width:1.5}.bntab.on{color:var(--gold)}
.gtabs{display:flex;background:var(--s1);border-top:1px solid var(--b1);flex-shrink:0;padding-bottom:env(safe-area-inset-bottom,0px)}
.gtab{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:8px 0 7px;font-size:8px;letter-spacing:.8px;font-weight:600;color:var(--muted);cursor:pointer;border:none;background:none;text-transform:uppercase;transition:color .2s}
.gtab svg{width:18px;height:18px;stroke-width:1.5}.gtab.on{color:var(--gold)}
.tl{width:14px;height:2px;border-radius:1px;background:var(--gold);margin-top:1px;opacity:0;transition:opacity .2s}
.bntab.on .tl,.gtab.on .tl{opacity:1}
.card{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:14px;margin-bottom:10px;position:relative;overflow:hidden}
.ca{position:absolute;top:0;left:0;right:0;height:2px}
.cag{background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.car{background:linear-gradient(90deg,transparent,var(--red),transparent)}
.cab{background:linear-gradient(90deg,transparent,var(--blue),transparent)}
.cap{background:linear-gradient(90deg,transparent,var(--purple),transparent)}
.cagr{background:linear-gradient(90deg,transparent,var(--green),transparent)}
.inp{width:100%;background:var(--s3);border:1px solid var(--b2);border-radius:6px;padding:12px 13px;color:var(--text);font-family:"Jost",sans-serif;font-size:14px;outline:none;margin-bottom:8px;transition:border-color .2s;-webkit-appearance:none}
.inp:focus{border-color:var(--gold)}.inp::placeholder{color:var(--muted)}
.inp.code-inp{font-family:"Playfair Display",serif;font-size:26px;letter-spacing:6px;text-align:center;text-transform:uppercase}
.btn{width:100%;padding:13px;border:none;border-radius:6px;font-family:"Jost",sans-serif;font-size:13px;font-weight:700;letter-spacing:1.5px;text-transform:uppercase;cursor:pointer;transition:opacity .2s;margin-bottom:8px}
.btn:active{opacity:.8}.btn:disabled{opacity:.3;cursor:not-allowed}
.bg{background:var(--gold);color:#07070a}.br{background:var(--red);color:#fff}
.bs{background:var(--s3);color:var(--muted2);border:1px solid var(--b2)}
.slabel{font-size:9px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:8px;margin-top:2px}
.prow{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:10px 12px;margin-bottom:7px;position:relative;overflow:hidden}
.prow.dead{opacity:.3}.prow.dead::after{content:"";position:absolute;top:50%;left:12px;right:12px;height:1px;background:var(--red);opacity:.6}
.pava{width:32px;height:32px;border-radius:50%;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:15px;flex-shrink:0}
.pname{flex:1;font-size:13px}.pme{font-size:9px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-left:4px}
.adot{width:6px;height:6px;border-radius:50%;flex-shrink:0}.adota{background:var(--green)}.adotd{background:var(--red)}
.user-card{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px 14px;margin-bottom:12px}
.user-ava{width:44px;height:44px;border-radius:50%;background:linear-gradient(135deg,var(--gold),#7a5c10);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;border:2px solid #c8a84b44}
.user-name{font-size:15px;font-weight:600;margin-bottom:2px}.user-stat{font-size:11px;color:var(--muted)}
.menu-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.menu-btn{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:14px 10px;text-align:center;cursor:pointer;transition:border-color .2s;display:flex;flex-direction:column;align-items:center;gap:6px}
.menu-btn:active{background:var(--s3)}.menu-btn.primary{border-color:#c8a84b33;background:linear-gradient(135deg,#1a1000,var(--s2))}
.menu-icon{font-size:24px}.menu-label{font-size:11px;font-weight:600;letter-spacing:.5px}.menu-sub{font-size:10px;color:var(--muted)}
.room-card{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px 13px;margin-bottom:8px;cursor:pointer;transition:border-color .2s;position:relative;overflow:hidden}
.room-card:active{background:var(--s3)}.room-card.avail{border-color:#2ecc7122}
.room-card.avail::before{content:"";position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent)}
.room-card.busy{opacity:.5;pointer-events:none}
.rc-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.rc-code{font-family:"Playfair Display",serif;font-size:20px;font-weight:700;color:var(--gold);letter-spacing:3px}
.rc-badge{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:10px}
.rc-badge.open{background:#082008;color:var(--green);border:1px solid #2ecc7130}
.rc-badge.busy{background:#1a1a1a;color:var(--muted);border:1px solid var(--b2)}
.rc-info{display:flex;gap:10px;font-size:11px;color:var(--muted)}
.code-box{text-align:center;background:var(--s2);border:1px solid #c8a84b30;border-radius:8px;padding:18px;margin-bottom:12px}
.code-lbl{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:6px}
.code-big{font-family:"Playfair Display",serif;font-size:44px;font-weight:900;letter-spacing:10px;color:var(--gold)}
.stats-row{display:flex;gap:7px;margin-bottom:12px}
.sbox{flex:1;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:10px;text-align:center}
.snum{font-family:"Playfair Display",serif;font-size:21px;font-weight:700;color:var(--gold)}
.slbl2{font-size:9px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.role-hidden{text-align:center;padding:26px 14px;cursor:pointer;background:var(--s2);border:1px dashed var(--b2);border-radius:8px;margin-bottom:10px}
.role-hidden h3{font-family:"Playfair Display",serif;font-size:18px;color:var(--muted2);margin-bottom:4px}
.role-hidden p{font-size:11px;color:var(--muted);line-height:1.6}
.role-emoji{font-size:54px;margin-bottom:10px;display:block}
.role-title{font-family:"Playfair Display",serif;font-size:25px;font-weight:700;margin-bottom:4px}
.rtm{color:var(--red)}.rtc{color:var(--blue)}.rts{color:var(--purple)}.rtn{color:var(--gold)}
.role-desc{color:var(--muted2);font-size:12px;line-height:1.7;margin-bottom:12px}
.role-ab{background:var(--s3);border-radius:6px;padding:10px 12px}
.ral{font-size:9px;font-weight:600;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:3px}
.rat{font-size:12px;color:var(--gold)}
.mafia-team{background:#100406;border:1px solid #e74c3c18;border-radius:6px;padding:10px 12px;margin-top:8px}
.mtl{font-size:9px;font-weight:600;letter-spacing:2px;color:var(--red);text-transform:uppercase;margin-bottom:6px}
.mm{display:flex;align-items:center;gap:7px;padding:3px 0;font-size:12px}
.mmd{width:5px;height:5px;border-radius:50%;background:var(--red);flex-shrink:0}
.vitem{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:10px 12px;margin-bottom:7px;cursor:pointer;position:relative;overflow:hidden;transition:border-color .2s}
.vitem:active{background:var(--s3)}.vitem.sel{border-color:var(--red);background:#100406}
.vitem.sel::before{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--red)}
.vitem.done{pointer-events:none;opacity:.7}
.vava{width:36px;height:36px;border-radius:50%;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0}
.vname{flex:1;font-size:13px}.vcnt{font-size:11px;color:var(--muted)}
.vbar{height:2px;background:var(--b2);border-radius:1px;margin-top:4px;overflow:hidden}
.vbf{height:100%;background:var(--red);border-radius:1px;transition:width .5s}
.vstatus{font-size:11px;color:var(--muted);text-align:center;padding:6px;line-height:1.5}
.chat-wrap{display:flex;flex-direction:column;flex:1;overflow:hidden}
.chat-msgs{flex:1;overflow-y:auto;padding:10px 14px}.chat-msgs::-webkit-scrollbar{display:none}
.chat-msg{margin-bottom:10px}.chat-msg-me{text-align:right}
.chat-bubble{display:inline-block;max-width:80%;padding:8px 12px;border-radius:12px;font-size:13px;line-height:1.5}
.chat-bubble-in{background:var(--s2);border:1px solid var(--b2);border-bottom-left-radius:3px}
.chat-bubble-out{background:var(--gold);color:#07070a;border-bottom-right-radius:3px}
.chat-name{font-size:10px;color:var(--muted);margin-bottom:3px;font-weight:600}
.chat-time{font-size:9px;color:var(--muted);margin-top:2px}
.chat-input-row{display:flex;gap:8px;padding:10px 14px;border-top:1px solid var(--b1);background:var(--s1);flex-shrink:0}
.chat-input{flex:1;background:var(--s3);border:1px solid var(--b2);border-radius:20px;padding:10px 14px;color:var(--text);font-family:"Jost",sans-serif;font-size:13px;outline:none}
.chat-input::placeholder{color:var(--muted)}
.chat-send{width:40px;height:40px;border-radius:50%;background:var(--gold);border:none;color:#07070a;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.chat-sys{text-align:center;font-size:10px;color:var(--muted);padding:4px 0;margin-bottom:6px}
.timer-wrap{text-align:center;padding:12px 0 6px}
.tphl{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-bottom:4px}
.tphn{font-family:"Playfair Display",serif;font-size:19px;margin-bottom:14px}
.ring-wrap{position:relative;width:130px;height:130px;margin:0 auto 14px}
.ring-wrap svg{width:130px;height:130px;transform:rotate(-90deg)}
circle.rbg{fill:none;stroke:var(--s3);stroke-width:5}
circle.rpg{fill:none;stroke-width:5;stroke-linecap:round;transition:stroke-dashoffset 1s linear,stroke .4s}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.rtime{font-family:"Playfair Display",serif;font-size:31px;font-weight:700;line-height:1}
.rlbl{font-size:9px;letter-spacing:2px;color:var(--muted);text-transform:uppercase;margin-top:2px}
.log-item{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--b1);font-size:11px}
.lt{color:var(--gold);font-weight:600;flex-shrink:0}.lx{flex:1;color:var(--muted2);line-height:1.5}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.stat-tile{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px;text-align:center}
.stat-big{font-family:"Playfair Display",serif;font-size:26px;font-weight:700;color:var(--gold)}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:2px}
.lb-row{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:10px 12px;margin-bottom:7px}
.lb-rank{font-family:"Playfair Display",serif;font-size:16px;font-weight:700;width:28px;text-align:center;flex-shrink:0}
.lb-wins{font-size:13px;color:var(--gold);font-weight:600}
.lb-games{font-size:10px;color:var(--muted);margin-top:2px}
.rules-role{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:1px solid var(--b1)}
.rules-icon{font-size:18px;flex-shrink:0;width:24px;text-align:center;margin-top:1px}
.rules-role-name{font-size:12px;font-weight:600;margin-bottom:2px}
.rules-role-desc{font-size:11px;color:var(--muted);line-height:1.5}
.hctrl{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:12px;margin-bottom:10px}
.hctrl-title{font-size:9px;font-weight:600;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-bottom:10px}
.hc-btn{width:100%;padding:10px;background:var(--s3);border:1px solid var(--b2);border-radius:5px;color:var(--text);font-family:"Jost",sans-serif;font-size:12px;font-weight:600;cursor:pointer;margin-bottom:7px;text-align:left}
.hc-btn.danger{color:var(--red);border-color:#e74c3c20}.hc-btn.primary{color:var(--gold);border-color:#c8a84b20}
.win-card{background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:22px 16px;text-align:center;margin-bottom:10px;position:relative;overflow:hidden}
.win-emoji{font-size:48px;margin-bottom:10px;display:block}
.win-title{font-family:"Playfair Display",serif;font-size:24px;font-weight:900;margin-bottom:4px}
.win-sub{font-size:12px;color:var(--muted2)}
.wrow{display:flex;align-items:center;gap:9px;background:var(--s3);border-radius:5px;padding:9px 11px;margin-bottom:6px}
.mode-item{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b1);border-radius:6px;padding:10px 12px;margin-bottom:7px;cursor:pointer;transition:border-color .2s}
.mode-item.sel{border-color:var(--gold);background:#100e00}
.mi-check{font-size:13px;color:var(--gold);opacity:0;transition:opacity .2s}.mode-item.sel .mi-check{opacity:1}
#ld{position:fixed;inset:0;background:var(--bg);z-index:200;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .4s}
.ld-logo{font-family:"Playfair Display",serif;font-size:26px;font-weight:900;letter-spacing:3px;background:linear-gradient(135deg,var(--gold),var(--gold2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.ld-dots{display:flex;gap:5px}
.ld-dot{width:5px;height:5px;border-radius:50%;background:var(--gold);animation:blink 1.2s infinite}
.ld-dot:nth-child(2){animation-delay:.2s}.ld-dot:nth-child(3){animation-delay:.4s}
@keyframes blink{0%,80%,100%{opacity:.15}40%{opacity:1}}
.toast{position:fixed;bottom:75px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--gold);color:#07070a;padding:8px 18px;border-radius:20px;font-size:11px;font-weight:700;z-index:1000;opacity:0;transition:all .3s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.fi{animation:fadeUp .3s ease both}
</style>
</head>
<body>
